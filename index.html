<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Sport App</title>

<link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0a0a0a;
  color: white;
}

/* LAYOUT */
.container {
  display: flex;
  height: 100vh;
}

/* LINKS: TABELLE */
.sidebar {
  width: 280px;
  background: #111;
  padding: 10px;
  overflow-y: auto;
}

.sidebar h3 {
  text-align: center;
}

table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}

th, td {
  padding: 6px;
  border-bottom: 1px solid #333;
  text-align: center;
}

/* RECHTS: SPIELE */
.main {
  flex: 1;
  padding: 20px;
  overflow-y: auto;
}

.card {
  background: #1a1a1a;
  padding: 15px;
  border-radius: 10px;
  margin-bottom: 15px;
  cursor: pointer;
}

.card:hover {
  background: #2a2a2a;
}

/* STATUS */
.ok { color: #00ff88; }
.bad { color: red; }

/* PLAYER */
#playerView {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: black;
  display: none;
  flex-direction: column;
}

/* KEIN SCROLL IM PLAYER */
body.no-scroll {
  overflow: hidden;
}

/* TOPBAR FIX */
.topbar {
  height: 50px;
  background: rgba(0,0,0,0.85);
  display: flex;
  align-items: center;
  padding: 0 15px;
  position: absolute;
  top: 0;
  width: 100%;
  z-index: 10;
}

.back-btn {
  cursor: pointer;
  padding: 6px 12px;
  background: #222;
  border-radius: 6px;
}

/* VIDEO */
.video-js {
  width: 100%;
  height: 100%;
}

/* MOBILE */
@media (max-width: 900px) {
  .container {
    flex-direction: column;
  }

  .sidebar {
    width: 100%;
    height: 200px;
  }
}
</style>
</head>

<body>

<div id="app" class="container">

  <!-- TABELLE -->
  <div class="sidebar">
    <h3>Tabelle</h3>
    <table id="table"></table>
  </div>

  <!-- SPIELE -->
  <div class="main">
    <h2>Spiele</h2>
    <div id="games"></div>
  </div>

</div>

<!-- PLAYER -->
<div id="playerView">

  <div class="topbar">
    <div class="back-btn" onclick="closePlayer()">← Zurück</div>
  </div>

  <video id="video" class="video-js" controls autoplay></video>

</div>

<script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>

<script>

let player = videojs('video');

/* SPIELE */
const games = [
  {
    team1: "Eintracht",
    team2: "Köln",
    date: "2026-04-5",
    time: "17:30",
    stream: "https://a50.azplay31.me/hls/streama227403/index.m3u8?cst=dc4834af01a29dab00fedd69c307fe84"
  },
];

/* SPIELE ANZEIGEN */
function renderGames() {
  let container = document.getElementById("games");
  container.innerHTML = "";

  games.forEach((g, i) => {

    let status = g.stream
      ? `<div class="ok">VERFÜGBAR</div>`
      : `<div class="bad">NOT AVAILABLE</div>`;

    let click = g.stream ? `onclick="play(${i})"` : "";

    container.innerHTML += `
      <div class="card" ${click}>
        <b>${g.team1} vs ${g.team2}</b><br>
        ${g.date} ${g.time}<br>
        ${status}
      </div>
    `;
  });
}

/* PLAYER */
function play(i) {
  if (!games[i].stream) return;

  document.body.classList.add("no-scroll");
  document.getElementById("app").style.display = "none";
  document.getElementById("playerView").style.display = "flex";

  player.src({
    src: games[i].stream,
    type: "application/x-mpegURL"
  });
}

function closePlayer() {
  player.pause();

  document.body.classList.remove("no-scroll");
  document.getElementById("playerView").style.display = "none";
  document.getElementById("app").style.display = "flex";
}

/* TABELLE */
async function loadTable() {
  try {
    const res = await fetch("https://api.openligadb.de/getbltable/bl1/2025");
    const data = await res.json();

    let table = document.getElementById("table");
    table.innerHTML = "<tr><th>#</th><th>Team</th><th>P</th></tr>";

    data.forEach((t, i) => {
      table.innerHTML += `
        <tr>
          <td>${i + 1}</td>
          <td>${t.teamName}</td>
          <td>${t.points}</td>
        </tr>
      `;
    });

  } catch (e) {
    console.log("Fehler Tabelle");
  }
}

/* START */
renderGames();
loadTable();

</script>

</body>
</html>
